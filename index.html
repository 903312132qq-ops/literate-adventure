<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>重量分摊</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
padding:18px;
color:#111;
}

h1{
font-size:38px;
font-weight:800;
margin-bottom:22px;
}

.card{
background:#fff;
border-radius:22px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 10px rgba(0,0,0,.03);
}

.label{
font-size:17px;
margin-bottom:10px;
color:#666;
}

.total-input{
width:100%;
height:64px;
border:2px solid #e5e5ea;
border-radius:18px;
padding:0 18px;
font-size:30px;
font-weight:700;
outline:none;
}

.row{
display:grid;
grid-template-columns:1.5fr 1fr 1fr 56px;
gap:10px;
align-items:center;
}

.input{
height:64px;
border:2px solid #e5e5ea;
border-radius:18px;
padding:0 14px;
font-size:28px;
font-weight:700;
outline:none;
text-align:center;
background:#fff;
}

.result{
height:64px;
border-radius:18px;
background:#eef5ff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:800;
color:#111;
}

.del{
height:56px;
width:56px;
border:none;
border-radius:18px;
background:#ff4d4f;
color:#fff;
font-size:32px;
font-weight:bold;
}

.add-btn{
width:100%;
height:66px;
border:none;
border-radius:22px;
background:#1677ff;
color:#fff;
font-size:24px;
font-weight:700;
margin-top:8px;
}

.clear-btn{
width:100%;
height:66px;
border:none;
border-radius:22px;
background:#ff4d4f;
color:#fff;
font-size:24px;
font-weight:700;
margin-top:14px;
}

</style>
</head>

<body>

<h1>重量分摊</h1>

<div class="card">

<div class="label">总重量 (kg)</div>

<input
id="kg"
class="total-input"
type="number"
placeholder="输入总重量"
oninput="calc()"
>

</div>

<div id="rows"></div>

<button class="add-btn" onclick="addRow()">
＋ 新增一行
</button>

<button class="clear-btn" onclick="clearAll()">
清空全部
</button>

<script>

function addRow(spec='',qty=''){

const div=document.createElement('div');

div.className='card';

div.innerHTML=`

<div class="row">

<input
class="input spec"
placeholder="1.0*255"
value="${spec}"
oninput="calc()"
>

<input
class="input qty"
type="number"
placeholder="数量"
value="${qty}"
oninput="calc()"
>

<div class="result">0.000吨</div>

<button class="del" onclick="removeRow(this)">
−
</button>

</div>

`;

document.getElementById('rows').appendChild(div);

calc();

}

function removeRow(btn){

btn.closest('.card').remove();

calc();

}

function calc(){

const totalKg=parseFloat(document.getElementById('kg').value)||0;

const specs=document.querySelectorAll('.spec');
const qtys=document.querySelectorAll('.qty');
const results=document.querySelectorAll('.result');

let vals=[];
let total=0;

for(let i=0;i<specs.length;i++){

let width=0;

if(specs[i].value.includes('*')){

width=parseFloat(specs[i].value.split('*')[1])||0;

}

let qty=parseFloat(qtys[i].value)||0;

let val=width*qty;

vals.push(val);

total+=val;

}

for(let i=0;i<vals.length;i++){

let ton=total ? vals[i]/total*totalKg/1000 : 0;

results[i].innerHTML=ton.toFixed(3)+'吨';

}

save();

}

function save(){

const rows=[];

document.querySelectorAll('#rows .card').forEach(card=>{

rows.push({

spec:card.querySelector('.spec').value,

qty:card.querySelector('.qty').value

});

});

localStorage.setItem('rows',JSON.stringify(rows));

localStorage.setItem('kg',document.getElementById('kg').value);

}

function load(){

const kg=localStorage.getItem('kg');

if(kg){

document.getElementById('kg').value=kg;

}

const rows=JSON.parse(localStorage.getItem('rows')||'[]');

if(rows.length){

rows.forEach(r=>addRow(r.spec,r.qty));

}else{

addRow();

}

}

function clearAll(){

localStorage.clear();

location.reload();

}

load();

</script>

</body>
</html>
