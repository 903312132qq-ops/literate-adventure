<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>重量分摊</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f3f3f7;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    padding:22px 18px 40px;
    color:#111;
}

/* 标题 */

h1{
    font-size:56px;
    font-weight:900;
    letter-spacing:-2px;
    margin-bottom:26px;
}

/* 卡片 */

.card{
    background:#fff;
    border-radius:28px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 2px 12px rgba(0,0,0,.03);
}

/* 标签 */

.label{
    font-size:18px;
    color:#666;
    margin-bottom:14px;
    font-weight:600;
}

/* 总重量输入 */

.total-input{
    width:100%;
    height:88px;
    border:none;
    border-radius:22px;
    background:#f7f7f7;
    padding:0 24px;
    font-size:34px;
    font-weight:800;
    outline:none;
}

.total-input::placeholder{
    color:#c9c9c9;
}

/* 表头 */

.header{
    display:grid;
    grid-template-columns:1.1fr 1fr 0.72fr 42px;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
    padding:0 6px;
}

.header div{
    font-size:17px;
    color:#777;
    font-weight:700;
}

/* 每行 */

.row{
    display:grid;
    grid-template-columns:1.1fr 1fr 0.72fr 42px;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
}

/* 输入框 */

.spec,
.qty{
    border:none;
    background:#f7f7f7;
    border-radius:18px;
    outline:none;
    text-align:center;
    height:76px;
    font-weight:800;
}

/* 规格小一点 */

.spec{
    font-size:20px;
    color:#333;
}

/* 数量大一点 */

.qty{
    font-size:32px;
    color:#111;
}

/* placeholder */

.spec::placeholder,
.qty::placeholder{
    color:#bdbdbd;
}

/* 吨数 */

.ton{
    height:76px;
    border-radius:18px;
    background:#edf4ff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    line-height:1;
}

.ton-num{
    font-size:20px;
    font-weight:900;
    color:#2477ff;
}

.ton-unit{
    margin-top:4px;
    font-size:15px;
    font-weight:700;
    color:#2477ff;
}

/* 删除按钮 */

.delete-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#ff4d57;
    color:#fff;
    font-size:22px;
    font-weight:700;
}

/* 底部按钮 */

.bottom{
    display:flex;
    gap:14px;
    margin-top:22px;
}

.add-btn,
.clear-btn{
    border:none;
    color:#fff;
    font-size:24px;
    font-weight:800;
    height:84px;
    border-radius:24px;
}

.add-btn{
    flex:1.5;
    background:#2478ff;
}

.clear-btn{
    flex:0.8;
    background:#ff4d57;
}

</style>
</head>

<body>

<h1>重量分摊</h1>

<!-- 总重量 -->

<div class="card">

    <div class="label">
        总重量（kg）
    </div>

    <input
        id="kg"
        class="total-input"
        type="number"
        placeholder="输入重量"
        oninput="calc()"
    >

</div>

<!-- 数据区域 -->

<div class="card">

    <div class="header">

        <div>规格</div>

        <div>数量</div>

        <div>吨数</div>

        <div></div>

    </div>

    <div id="rows"></div>

</div>

<!-- 按钮 -->

<div class="bottom">

    <button
        class="add-btn"
        onclick="addRow()">

        ＋ 新增

    </button>

    <button
        class="clear-btn"
        onclick="clearAll()">

        清空

    </button>

</div>

<script>

/* 新增 */

function addRow(spec='',qty=''){

    const div=document.createElement('div');

    div.className='row';

    div.innerHTML=`

        <input
            class="spec"
            placeholder="1.0*255"
            value="${spec}"
            oninput="calc()"
        >

        <input
            class="qty"
            type="number"
            placeholder="数量"
            value="${qty}"
            oninput="calc()"
        >

        <div class="ton">

            <div class="ton-num">
                0.000
            </div>

            <div class="ton-unit">
                吨
            </div>

        </div>

        <button
            class="delete-btn"
            onclick="removeRow(this)">

            ×

        </button>

    `;

    document.getElementById('rows').appendChild(div);

    calc();

}

/* 删除 */

function removeRow(btn){

    btn.parentElement.remove();

    calc();

}

/* 计算 */

function calc(){

    const totalKg=parseFloat(
        document.getElementById('kg').value
    ) || 0;

    const rows=document.querySelectorAll('.row');

    let vals=[];

    let total=0;

    rows.forEach(row=>{

        const spec=row.querySelector('.spec').value;

        const qty=parseFloat(
            row.querySelector('.qty').value
        ) || 0;

        let width=0;

        if(spec.includes('*')){

            width=parseFloat(
                spec.split('*')[1]
            ) || 0;

        }

        const val=width*qty;

        vals.push(val);

        total+=val;

    });

    rows.forEach((row,index)=>{

        const ton=total
        ? vals[index]/total*totalKg/1000
        : 0;

        row.querySelector('.ton-num').innerHTML=
        ton.toFixed(3);

    });

    save();

}

/* 保存 */

function save(){

    const data=[];

    document.querySelectorAll('.row').forEach(row=>{

        data.push({

            spec:row.querySelector('.spec').value,

            qty:row.querySelector('.qty').value

        });

    });

    localStorage.setItem(
        'rows',
        JSON.stringify(data)
    );

    localStorage.setItem(
        'kg',
        document.getElementById('kg').value
    );

}

/* 读取 */

function load(){

    const kg=localStorage.getItem('kg');

    if(kg){

        document.getElementById('kg').value=kg;

    }

    const rows=JSON.parse(
        localStorage.getItem('rows') || '[]'
    );

    if(rows.length){

        rows.forEach(r=>{

            addRow(r.spec,r.qty);

        });

    }else{

        addRow();
        addRow();
        addRow();

    }

}

/* 清空 */

function clearAll(){

    localStorage.clear();

    location.reload();

}

load();

</script>

</body>
</html>
