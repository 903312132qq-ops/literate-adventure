<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>重量分摊</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f5f7;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:14px;
color:#111;
}

h1{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.top{
background:#fff;
border-radius:16px;
padding:14px;
margin-bottom:12px;
border:1px solid #e5e5ea;
}

.topLabel{
font-size:15px;
color:#666;
margin-bottom:8px;
}

#kg{
width:100%;
height:52px;
border:none;
outline:none;
background:#f7f7f8;
border-radius:12px;
padding:0 14px;
font-size:28px;
font-weight:800;
}

.table{

background:#fff;
border-radius:16px;
overflow:hidden;
border:1px solid #e5e5ea;

}

.header{

display:grid;
grid-template-columns:1.3fr .8fr .8fr 44px;
gap:8px;

padding:10px 12px;

background:#f2f2f7;

font-size:14px;

font-weight:700;

color:#666;

}

.row{

display:grid;

grid-template-columns:1.3fr .8fr .8fr 44px;

gap:8px;

padding:10px 12px;

border-top:1px solid #f0f0f0;

align-items:center;

}

.input{

width:100%;

height:44px;

border:none;

outline:none;

background:#f7f7f8;

border-radius:10px;

padding:0 10px;

font-size:20px;

font-weight:700;

text-align:center;

}

.result{

height:44px;

background:#eef5ff;

border-radius:10px;

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

font-weight:800;

color:#1677ff;

}

.del{

width:44px;

height:44px;

border:none;

border-radius:10px;

background:#ff4d4f;

color:#fff;

font-size:26px;

font-weight:bold;

}

.bottom{

display:flex;

gap:10px;

margin-top:14px;

}

.addBtn{

flex:1;

height:52px;

border:none;

border-radius:14px;

background:#1677ff;

color:#fff;

font-size:19px;

font-weight:800;

}

.clearBtn{

width:110px;

height:52px;

border:none;

border-radius:14px;

background:#ff4d4f;

color:#fff;

font-size:18px;

font-weight:800;

}

</style>

</head>

<body>

<h1>重量分摊</h1>

<div class="top">

<div class="topLabel">
总重量（kg）
</div>

<input
id="kg"
type="number"
placeholder="输入重量"
oninput="calc()"
>

</div>

<div class="table">

<div class="header">

<div>规格</div>

<div>数量</div>

<div>吨数</div>

<div></div>

</div>

<div id="rows"></div>

</div>

<div class="bottom">

<button
class="addBtn"
onclick="addRow()"
>
＋ 新增
</button>

<button
class="clearBtn"
onclick="clearAll()"
>
清空
</button>

</div>

<script>

function addRow(spec='',qty=''){

const div=document.createElement('div');

div.className='row';

div.innerHTML=`

<input
class="input spec"
placeholder="1.0*255"
value="${spec}"
oninput="calc()"
>

<input
class="input qty"
type="number"
placeholder="数量"
value="${qty}"
oninput="calc()"
>

<div class="result">
0.000
</div>

<button
class="del"
onclick="removeRow(this)"
>
×
</button>

`;

document.getElementById('rows').appendChild(div);

calc();

}

function removeRow(btn){

btn.parentElement.remove();

calc();

}

function calc(){

const totalKg=
parseFloat(
document.getElementById('kg').value
)||0;

const specs=
document.querySelectorAll('.spec');

const qtys=
document.querySelectorAll('.qty');

const results=
document.querySelectorAll('.result');

let vals=[];

let total=0;

for(let i=0;i<specs.length;i++){

let width=0;

if(specs[i].value.includes('*')){

width=
parseFloat(
specs[i].value.split('*')[1]
)||0;

}

let qty=
parseFloat(qtys[i].value)||0;

let val=width*qty;

vals.push(val);

total+=val;

}

for(let i=0;i<vals.length;i++){

let ton=
total
?
(vals[i]/total*totalKg/1000)
:
0;

results[i].innerHTML=
ton.toFixed(3);

}

save();

}

function save(){

const rows=[];

document.querySelectorAll('.row')
.forEach(r=>{

rows.push({

spec:r.querySelector('.spec').value,

qty:r.querySelector('.qty').value

});

});

localStorage.setItem(
'rows',
JSON.stringify(rows)
);

localStorage.setItem(
'kg',
document.getElementById('kg').value
);

}

function load(){

const kg=
localStorage.getItem('kg');

if(kg){

document.getElementById('kg').value=kg;

}

const rows=
JSON.parse(
localStorage.getItem('rows')||'[]'
);

if(rows.length){

rows.forEach(r=>{

addRow(r.spec,r.qty);

});

}else{

for(let i=0;i<5;i++){

addRow();

}

}

}

function clearAll(){

localStorage.clear();

location.reload();

}

load();

</script>

</body>

</html>
