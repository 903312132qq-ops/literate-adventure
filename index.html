<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>重量分摊</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:#f3f3f7;
    color:#111;
    padding:22px 18px 40px;
}

h1{
    font-size:58px;
    font-weight:900;
    letter-spacing:-2px;
    margin-bottom:28px;
}

/* 总重量区域 */

.total-card{
    background:#fff;
    border-radius:28px;
    padding:24px;
    margin-bottom:22px;
    box-shadow:0 2px 10px rgba(0,0,0,.03);
}

.label{
    font-size:18px;
    color:#666;
    margin-bottom:14px;
    font-weight:600;
}

.total-input{
    width:100%;
    height:92px;
    border:none;
    background:#f7f7f7;
    border-radius:22px;
    padding:0 28px;
    font-size:34px;
    font-weight:700;
    outline:none;
}

.total-input::placeholder{
    color:#c7c7c7;
}

/* 表格区域 */

.table-card{
    background:#fff;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.03);
}

/* 标题 */

.header{
    display:grid;
    grid-template-columns:1.25fr 0.9fr 0.72fr 52px;
    padding:18px 18px 14px;
    font-size:17px;
    font-weight:700;
    color:#666;
    border-bottom:1px solid #f1f1f1;
}

/* 每行 */

.row{
    display:grid;
    grid-template-columns:1.25fr 0.9fr 0.72fr 52px;
    gap:12px;
    padding:16px 18px;
    align-items:center;
    border-bottom:1px solid #f5f5f5;
}

.row:last-child{
    border-bottom:none;
}

/* 输入框 */

.spec,
.qty{
    height:78px;
    border:none;
    background:#f7f7f7;
    border-radius:18px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    outline:none;
    width:100%;
}

/* 规格稍微小一点 */

.spec{
    font-size:22px;
}

/* 数量稍微大一点 */

.qty{
    font-size:28px;
}

/* placeholder */

.spec::placeholder,
.qty::placeholder{
    color:#bfbfbf;
}

/* 吨数 */

.ton{
    height:78px;
    border-radius:18px;
    background:#eef4ff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-weight:800;
    color:#2470ff;
    line-height:1.05;
}

.ton-value{
    font-size:22px;
}

.ton-unit{
    font-size:18px;
    margin-top:2px;
}

/* 删除按钮缩小 */

.delete-btn{
    width:52px;
    height:52px;
    border:none;
    border-radius:16px;
    background:#ff4d57;
    color:#fff;
    font-size:28px;
    font-weight:700;
}

/* 底部按钮 */

.bottom{
    display:flex;
    gap:16px;
    margin-top:26px;
}

.add-btn,
.clear-btn{
    height:88px;
    border:none;
    border-radius:24px;
    color:#fff;
    font-size:24px;
    font-weight:800;
}

.add-btn{
    flex:1.6;
    background:#2478ff;
}

.clear-btn{
    flex:0.8;
    background:#ff4d57;
}

</style>
</head>

<body>

<h1>重量分摊</h1>

<!-- 总重量 -->

<div class="total-card">

    <div class="label">总重量（kg）</div>

    <input
        id="kg"
        class="total-input"
        type="number"
        placeholder="输入重量"
        oninput="calc()"
    />

</div>

<!-- 表格 -->

<div class="table-card">

    <div class="header">
        <div>规格</div>
        <div>数量</div>
        <div>吨数</div>
        <div></div>
    </div>

    <div id="rows"></div>

</div>

<!-- 按钮 -->

<div class="bottom">

    <button class="add-btn" onclick="addRow()">
        ＋ 新增
    </button>

    <button class="clear-btn" onclick="clearAll()">
        清空
    </button>

</div>

<script>

/* 新增一行 */

function addRow(spec='',qty=''){

    const div=document.createElement('div');

    div.className='row';

    div.innerHTML=`

        <input
            class="spec"
            placeholder="1.0*255"
            value="${spec}"
            oninput="calc()"
        >

        <input
            class="qty"
            type="number"
            placeholder="数量"
            value="${qty}"
            oninput="calc()"
        >

        <div class="ton">
            <div class="ton-value">0.000</div>
            <div class="ton-unit">吨</div>
        </div>

        <button class="delete-btn" onclick="removeRow(this)">
            ×
        </button>

    `;

    document.getElementById('rows').appendChild(div);

    calc();

}

/* 删除 */

function removeRow(btn){

    btn.parentElement.remove();

    calc();

}

/* 计算 */

function calc(){

    const totalKg=parseFloat(
        document.getElementById('kg').value
    ) || 0;

    const rows=document.querySelectorAll('.row');

    let vals=[];
    let total=0;

    rows.forEach(row=>{

        const spec=row.querySelector('.spec').value;

        const qty=parseFloat(
            row.querySelector('.qty').value
        ) || 0;

        let width=0;

        if(spec.includes('*')){

            width=parseFloat(
                spec.split('*')[1]
            ) || 0;

        }

        const val=width*qty;

        vals.push(val);

        total+=val;

    });

    rows.forEach((row,index)=>{

        const ton=total
            ? vals[index]/total*totalKg/1000
            : 0;

        row.querySelector('.ton-value').innerHTML=
            ton.toFixed(3);

    });

    save();

}

/* 保存 */

function save(){

    const data=[];

    document.querySelectorAll('.row').forEach(row=>{

        data.push({
            spec:row.querySelector('.spec').value,
            qty:row.querySelector('.qty').value
        });

    });

    localStorage.setItem(
        'rows',
        JSON.stringify(data)
    );

    localStorage.setItem(
        'kg',
        document.getElementById('kg').value
    );

}

/* 读取 */

function load(){

    const kg=localStorage.getItem('kg');

    if(kg){

        document.getElementById('kg').value=kg;

    }

    const rows=JSON.parse(
        localStorage.getItem('rows') || '[]'
    );

    if(rows.length){

        rows.forEach(r=>{

            addRow(r.spec,r.qty);

        });

    }else{

        addRow();
        addRow();
        addRow();

    }

}

/* 清空 */

function clearAll(){

    localStorage.clear();

    location.reload();

}

/* 启动 */

load();

</script>

</body>
</html>
