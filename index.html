<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>重量分摊</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f2f2f7;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
padding:18px;
color:#111;
}

h1{
font-size:42px;
font-weight:900;
margin-bottom:22px;
}

.card{
background:#fff;
border-radius:24px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 12px rgba(0,0,0,.03);
}

.label{
font-size:18px;
color:#666;
margin-bottom:10px;
}

.totalInput{
width:100%;
height:72px;
border:2px solid #e5e5ea;
border-radius:20px;
padding:0 18px;
font-size:34px;
font-weight:800;
outline:none;
}

.row{
display:flex;
align-items:center;
gap:10px;
}

.spec{
flex:1.2;
}

.qty{
width:120px;
flex:none;
}

.input{
height:64px;
border:2px solid #e5e5ea;
border-radius:18px;
padding:0 12px;
font-size:24px;
font-weight:700;
outline:none;
text-align:center;
background:#fff;
}

.result{
width:108px;
height:64px;
border-radius:18px;
background:#eef5ff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:900;
flex:none;
}

.del{
width:58px;
height:58px;
border:none;
border-radius:18px;
background:#ff4d4f;
color:#fff;
font-size:34px;
font-weight:bold;
flex:none;
}

.addBtn{
width:100%;
height:68px;
border:none;
border-radius:22px;
background:#1677ff;
color:#fff;
font-size:26px;
font-weight:800;
margin-top:8px;
}

.clearBtn{
width:100%;
height:68px;
border:none;
border-radius:22px;
background:#ff4d4f;
color:#fff;
font-size:26px;
font-weight:800;
margin-top:14px;
}

</style>

</head>

<body>

<h1>重量分摊</h1>

<div class="card">

<div class="label">总重量 (kg)</div>

<input
id="kg"
class="totalInput"
type="number"
placeholder="输入总重量"
oninput="calc()"
>

</div>

<div id="rows"></div>

<button class="addBtn" onclick="addRow()">
＋ 新增一行
</button>

<button class="clearBtn" onclick="clearAll()">
清空全部
</button>

<script>

function addRow(spec='',qty=''){

const div=document.createElement('div');

div.className='card';

div.innerHTML=`

<div class="row">

<input
class="input spec"
placeholder="1.0*255"
value="${spec}"
oninput="calc()"
>

<input
class="input qty"
type="number"
placeholder="数量"
value="${qty}"
oninput="calc()"
>

<div class="result">0.000吨</div>

<button
class="del"
onclick="removeRow(this)"
>
−
</button>

</div>

`;

document.getElementById('rows').appendChild(div);

calc();

}

function removeRow(btn){

btn.closest('.card').remove();

calc();

}

function calc(){

const totalKg=
parseFloat(document.getElementById('kg').value)||0;

const specs=document.querySelectorAll('.spec');
const qtys=document.querySelectorAll('.qty');
const results=document.querySelectorAll('.result');

let vals=[];
let total=0;

for(let i=0;i<specs.length;i++){

let width=0;

if(specs[i].value.includes('*')){

width=parseFloat(
specs[i].value.split('*')[1]
)||0;

}

let qty=parseFloat(qtys[i].value)||0;

let val=width*qty;

vals.push(val);

total+=val;

}

for(let i=0;i<vals.length;i++){

let ton=
total
?
(vals[i]/total*totalKg/1000)
:
0;

results[i].innerHTML=
ton.toFixed(3)+'吨';

}

save();

}

function save(){

const rows=[];

document.querySelectorAll('#rows .card')
.forEach(card=>{

rows.push({

spec:card.querySelector('.spec').value,

qty:card.querySelector('.qty').value

});

});

localStorage.setItem(
'rows',
JSON.stringify(rows)
);

localStorage.setItem(
'kg',
document.getElementById('kg').value
);

}

function load(){

const kg=localStorage.getItem('kg');

if(kg){

document.getElementById('kg').value=kg;

}

const rows=
JSON.parse(
localStorage.getItem('rows')||'[]'
);

if(rows.length){

rows.forEach(r=>{

addRow(r.spec,r.qty);

});

}else{

addRow();

}

}

function clearAll(){

localStorage.clear();

location.reload();

}

load();

</script>

</body>

</html>
